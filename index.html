<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
    <style>
      body { 
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
        font-family: 'Poppins', sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: flex-start; /* Mengubah ke start agar tidak terpotong di HP layar pendek */
        padding: 15px 0;
      }
      .form-container { 
        background: white; 
        padding: 30px 20px; /* Padding disesuaikan untuk HP */
        border-radius: 20px; 
        box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        border: 1px solid rgba(255,255,255,0.3);
        width: 100%;
        margin-bottom: 20px;
      }
      .header-title {
        color: #4a4a4a;
        font-weight: 600;
        margin-bottom: 25px;
        font-size: 1.4rem; /* Ukuran teks judul sedikit disesuaikan */
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .header-title img {
        width: 60px; /* Foto profil sedikit diperbesar */
        height: 60px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid #6c5ce7;
        margin-bottom: 10px; /* Agar foto dan teks punya ruang di mobile */
      }
      .form-label {
        font-weight: 600; /* Lebih tebal agar mudah dibaca */
        color: #444;
        margin-bottom: 10px;
        font-size: 1rem;
      }
      .form-label i {
        margin-right: 8px;
        color: #6c5ce7;
      }
      /* Memperbesar area input dan select agar mudah ditekan jari */
      .form-control, .form-select, .input-group-text {
        border-radius: 12px !important;
        padding: 14px; 
        font-size: 16px !important; /* Mencegah auto-zoom pada iPhone saat input focus */
        border: 1px solid #ced4da;
        transition: all 0.3s ease;
      }
      .form-control:focus, .form-select:focus {
        border-color: #6c5ce7;
        box-shadow: 0 0 0 0.25rem rgba(108, 92, 231, 0.1);
      }
      .btn-submit {
        background: linear-gradient(to right, #6c5ce7, #a29bfe);
        border: none;
        border-radius: 12px;
        padding: 16px; /* Tombol lebih tinggi agar mantap ditekan */
        font-weight: 600;
        font-size: 1.1rem;
        transition: transform 0.2s, box-shadow 0.2s;
        margin-top: 10px;
      }
      .btn-submit:active {
        transform: scale(0.98);
      }
      #status {
        border-radius: 12px;
        padding: 15px;
        font-weight: 500;
        font-size: 0.95rem;
        margin-top: 20px;
      }
      /* Menghapus margin kontainer di layar kecil agar lebih lebar */
      @media (max-width: 576px) {
        .container {
          padding-left: 10px;
          padding-right: 10px;
        }
        .form-container {
          padding: 25px 15px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          <div class="form-container">
            <h3 class="text-center header-title">
              <i class="fa-solid fa-heart-circle-check text-danger me-2"></i>Wedding Budgeting
            </h3>
            
            <form id="financeForm">
              <div class="mb-3">
                <label class="form-label"><i class="fa-solid fa-calendar-days"></i>Tanggal</label>
                <input type="date" class="form-control" name="tanggal" required>
              </div>

              <div class="mb-3">
                <label class="form-label"><i class="fa-solid fa-arrow-right-arrow-left"></i>Jenis Transaksi</label>
                <select class="form-select" name="jenis" required>
                  <option value="Income">Income (Pemasukan)</option>
                  <option value="Expenses">Expenses (Pengeluaran)</option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label"><i class="fa-solid fa-tag"></i>Kategori</label>
                <select class="form-select" name="kategori" required>
                  <option value="" disabled selected>Pilih Kategori...</option>
                  
                  <optgroup label="Pemasukan">
                    <option value="Tabungan">Tabungan</option>
                    <option value="Bonus">Bonus</option>
                  </optgroup>

                  <optgroup label="Pengeluaran">
                    <option value="Administrasi Persiapan Pernikahan">Administrasi Persiapan Pernikahan</option>
                    <option value="Prayer Sett">Prayer Set</option>
                    <option value="Toiletries">Toiletries</option>
                    <option value="Body Care">Body Care</option>
                    <option value="Skincare">Skincare</option>
                    <option value="Make Up">Make Up</option>
                    <option value="Clothes">Clothes</option>
                    <option value="Underwear">Underwear</option>
                    <option value="Accessories">Accessories</option>
                    <option value="Mahar">Mahar</option>
                    <option value="Souvenir">Souvenir</option>
                    <option value="Invitation">Invitation</option>
                    <option value="Lain-Lain">Lain-Lain</option>
                  </optgroup>
                  
                  <option value="Lainnya">Lainnya</option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label"><i class="fa-solid fa-money-bill-wave"></i>Nominal</label>
                <div class="input-group">
                  <span class="input-group-text bg-light">Rp</span>
                  <input type="number" class="form-control" name="nominal" placeholder="0" required>
                </div>
              </div>

              <div class="mb-4">
                <label class="form-label"><i class="fa-solid fa-pen-to-square"></i>Keterangan</label>
                <textarea class="form-control" name="keterangan" rows="2" placeholder="Catat sesuai yang berkaitan contoh Tedy,Nadya,Mukena,Sajadah..."></textarea>
              </div>

              <button type="submit" class="btn btn-primary btn-submit w-100">
                <i class="fa-solid fa-paper-plane me-2"></i>Simpan Transaksi
              </button>
            </form>

            <div id="status" class="mt-3 text-center alert alert-success" style="display:none;"></div>
          </div>
          
          <p class="text-center mt-3 text-muted" style="font-size: 0.8rem;">
            &copy; 2026 Wedding Planner Ledger
          </p>
        </div>
      </div>
    </div>

    <script>
  // Ganti URL ini dengan URL Web App Anda yang didapat setelah Deploy di Apps Script
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyHRjVSJEoK4D53q9L46y36e_eL5DgwyyEKTH3i7qBLCJ-Blkbehe3ACGl5eyWMkoYyQA/exec";

  // Otomatis isi tanggal hari ini
  document.getElementById('tanggalInput').valueAsDate = new Date();

  document.getElementById('financeForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const form = e.target;
    const btn = form.querySelector('button');
    const statusDiv = document.getElementById('status');
    
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Menyimpan...';

    // Mengambil data dari form
    const formData = new FormData(form);
    const data = {};
    formData.forEach((value, key) => data[key] = value);

    // Mengirim data ke Google Apps Script via Fetch API
    fetch(WEB_APP_URL, {
      method: "POST",
      mode: "no-cors", // Penting untuk menghindari error CORS di GitHub Pages
      body: JSON.stringify(data),
      headers: {
        "Content-Type": "application/json"
      }
    })
    .then(() => {
      statusDiv.innerText = "✅ Sukses! Data terkirim (Cek Spreadsheet Anda).";
      statusDiv.style.display = 'block';
      statusDiv.className = "mt-3 text-center alert alert-success";
      
      form.reset();
      document.getElementById('tanggalInput').valueAsDate = new Date();
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-paper-plane me-2"></i>Simpan Transaksi';
      
      setTimeout(() => {
        statusDiv.style.display = 'none';
      }, 5000);
    })
    .catch(err => {
      statusDiv.innerText = "❌ Terjadi kesalahan: " + err;
      statusDiv.style.display = 'block';
      statusDiv.className = "mt-3 text-center alert alert-danger";
      btn.disabled = false;
    });
  });
</script>
  </body>
</html>
