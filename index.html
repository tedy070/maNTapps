<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Input Budgeting 🍞</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #f5c9a8;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-family: 'Lora', serif;
  overflow-x: hidden;
}

/* ══ ANT & FIREWORKS ══ */
#ant-container {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 200; overflow: hidden;
}
#fireworks-canvas {
  position: fixed; top:0; left:0;
  width:100%; height:100%;
  pointer-events: none; z-index: 190;
}

/* ══════════════════════════════════════════════
   LOGIN SCENE
══════════════════════════════════════════════ */
#login-scene {
  display: flex; flex-direction: column; align-items: center;
  transition: opacity 0.8s ease, transform 0.8s ease;
  padding: 12px;
}
#login-scene.fade-out {
  opacity: 0; transform: scale(0.93) translateY(24px);
  pointer-events: none;
}
.login-title {
  font-family: 'Playfair Display', serif;
  font-size: 2.4rem; color: #2a1a0e;
  margin-bottom: 18px; letter-spacing: -1px;
  text-align: center; line-height: 1.2;
}
.scene {
  display: flex; flex-direction: column;
  align-items: center; position: relative;
}

/* ── LOGIN CARD ── */
.card-flipper {
  width: 280px; height: 250px;   /* taller for welcome face */
  position: relative; z-index: 5;
  perspective: 1000px; margin-bottom: -10px;
}
.card-inner {
  width: 100%; height: 100%;
  position: relative; transform-style: preserve-3d;
}
.card-front, .card-back {
  position: absolute; inset: 0;
  border-radius: 20px 20px 12px 12px;
  border: 5px solid #c89a5a; background: #fdf3d4;
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px 26px 20px;
  box-shadow: 0 6px 28px #a0723850;
}
.card-back {
  transform: rotateY(180deg);
  background: linear-gradient(150deg, #fdf3d4 40%, #f5e5a8 100%);
  justify-content: center; gap: 6px;
}
.card-front h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.35rem; color: #3a2010; margin-bottom: 15px;
}
.card-front input {
  width: 100%; padding: 9px 13px; border-radius: 10px;
  border: 1.5px solid #d4b07a; background: #fffbe8;
  font-family: 'Lora', serif; font-size: 0.9rem; color: #3a2010;
  margin-bottom: 10px; outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.card-front input:focus { border-color: #c07b3a; box-shadow: 0 0 0 3px #c07b3a1a; }
.pw-wrap { position: relative; width: 100%; margin-bottom: 10px; }
.pw-wrap input { margin-bottom: 0; padding-right: 38px; width: 100%; }
.eye-btn {
  position: absolute; right: 10px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: #b08060; display: flex; align-items: center;
  padding: 0; transition: color 0.2s;
}
.eye-btn:hover { color: #c07b3a; }
.hint { font-size: 0.74rem; color: #b08060; font-style: italic; margin-top: 2px; }

/* ── WELCOME BACK card (bigger & richer) ── */
.wb-deco {
  font-size: 3.6rem; line-height: 1;
  filter: drop-shadow(0 4px 8px #a07030aa);
  animation: wbBounce 1.4s ease-in-out infinite alternate;
}
@keyframes wbBounce {
  from { transform: translateY(0) rotate(-5deg); }
  to   { transform: translateY(-6px) rotate(5deg); }
}
.wb-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.7rem; color: #5a3010;
  text-align: center; line-height: 1.25; margin-top: 4px;
}
.wb-name {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem; color: #a07030;
  text-align: center; font-style: italic;
}
.wb-divider {
  width: 60%; height: 1.5px;
  background: linear-gradient(90deg, transparent, #c89a5a, transparent);
  margin: 6px 0;
}
.wb-sub {
  font-size: 0.8rem; color: #b08060;
  font-style: italic; text-align: center;
  line-height: 1.5;
}
.wb-badges {
  display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
  margin-top: 6px;
}
.wb-badge {
  background: #f5e0a0; border: 1px solid #d4b07a;
  border-radius: 20px; padding: 2px 10px;
  font-size: 0.68rem; color: #7a4a10;
  font-family: 'Lora', serif;
}

/* ══ TOASTER ══ */
.toaster-wrap { position: relative; width: 320px; z-index: 10; }
.toaster-body { width: 100%; height: 115px; position: relative; }
.toaster-left, .toaster-right {
  position: absolute; top: 0; height: 100%;
  background: linear-gradient(175deg, #b8d4ee 0%, #8ab4d4 100%);
  transition: transform 0.5s cubic-bezier(0.4,0,0.2,1), opacity 0.4s ease;
  overflow: hidden;
}
.toaster-left  { left:0; width:50%; border-radius:16px 0 0 22px; box-shadow:-4px 8px 20px #5070a040,inset 2px 2px 8px #ffffff70; }
.toaster-right { right:0; width:50%; border-radius:0 16px 22px 0; box-shadow:4px 8px 20px #5070a040,inset -2px 2px 8px #ffffff70; }
.toaster-slot {
  position: absolute; top:-9px; left:50%; transform:translateX(-50%);
  width:210px; height:15px; background:#1e1208;
  border-radius:8px 8px 0 0; z-index:12; pointer-events:none;
}
.crack-overlay {
  position: absolute; top:0; left:50%; transform:translateX(-50%);
  width:40px; height:115px; z-index:15; pointer-events:none;
  opacity:0; transition:opacity 0.2s;
}
.crack-overlay.visible { opacity:1; }
.heating-bar {
  position: absolute; top:-3px; left:50%; transform:translateX(-50%);
  width:210px; height:6px; background:transparent;
  border-radius:0 0 5px 5px;
  transition: background 0.5s, box-shadow 0.5s; z-index:13;
}
.heating-bar.active { background:#e84010; box-shadow:0 0 20px 5px #e8401085; }
.toaster-left.split  { transform:translateX(-62px) rotate(-3deg); opacity:0.7; }
.toaster-right.split { transform:translateX( 62px) rotate( 3deg); opacity:0.7; }
@keyframes shake {
  0%,100%{ transform:translateX(0) rotate(0deg); }
  15%{ transform:translateX(-4px) rotate(-1deg); }
  30%{ transform:translateX(5px) rotate(1.5deg); }
  45%{ transform:translateX(-5px) rotate(-1.5deg); }
  60%{ transform:translateX(4px) rotate(1deg); }
  75%{ transform:translateX(-3px) rotate(-0.5deg); }
}
.toaster-body.shaking { animation:shake 0.45s ease; }

/* ── CREATE BTN ── */
.create-btn-wrap { position:absolute; left:12px; top:50%; transform:translateY(-50%); z-index:20; }
.create-btn {
  width:56px; height:56px;
  background:linear-gradient(145deg,#fdf3d4,#f0d898);
  border:2.5px solid #c89a5a; border-radius:11px;
  cursor:pointer; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:3px;
  box-shadow:0 4px 12px #a0723850,inset 0 1px 3px #ffffff90;
  transition:transform 0.15s, box-shadow 0.15s;
  font-family:'Lora',serif; font-size:0.52rem; color:#7a4a10;
  text-align:center; line-height:1.2;
}
.create-btn:hover { transform:translateY(-2px); box-shadow:0 7px 18px #a0723870; }
.create-btn:active { transform:translateY(1px); }
.create-btn .btn-icon { font-size:1.15rem; line-height:1; }

/* ── LEVER ── */
.lever-wrap {
  position:absolute; right:26px; top:8px;
  display:flex; flex-direction:column; align-items:center;
  z-index:20; cursor:pointer; user-select:none;
}
.lever-label { font-family:'Lora',serif; font-size:0.6rem; font-weight:600; color:#1e1208; letter-spacing:1px; }
.lever-label.top { margin-bottom:3px; }
.lever-label.bot { margin-top:3px; }
.lever-track { width:5px; height:70px; background:#1e1208; border-radius:4px; position:relative; }
.lever-knob {
  width:24px; height:24px;
  background:radial-gradient(circle at 35% 30%,#ff7070,#bb1818);
  border-radius:50%; border:3px solid #880000;
  position:absolute; left:50%; transform:translateX(-50%);
  top:0; box-shadow:0 3px 10px #bb181870;
  transition:top 0.55s cubic-bezier(0.34,1.56,0.64,1); cursor:grab;
}
.lever-knob.pulled { top:46px; }

/* ── REGISTER CARD ── */
#register-card {
  position:absolute;
  left:50%; transform:translateX(-50%) translateY(40px) scale(0.85);
  top:0; width:290px;
  background:#fdf3d4; border:5px solid #c89a5a; border-radius:20px;
  padding:26px 26px 22px; box-shadow:0 8px 36px #a0723870;
  z-index:50; opacity:0; pointer-events:none;
  transition:opacity 0.55s cubic-bezier(0.22,1,0.36,1), transform 0.55s cubic-bezier(0.22,1,0.36,1);
  overflow-y: auto; max-height: 80vh;
}
#register-card.open {
  opacity:1; pointer-events:all;
  transform:translateX(-50%) translateY(-320px) scale(1);
}
#register-card h2 { font-family:'Playfair Display',serif; font-size:1.2rem; color:#3a2010; text-align:center; margin-bottom:14px; }
#register-card .reg-row { display:flex; gap:8px; margin-bottom:10px; }
#register-card input, #register-card select {
  width:100%; padding:8px 12px; border-radius:10px;
  border:1.5px solid #d4b07a; background:#fffbe8;
  font-family:'Lora',serif; font-size:0.85rem; color:#3a2010;
  margin-bottom:10px; outline:none;
  transition:border-color 0.2s, box-shadow 0.2s; appearance:none;
}
#register-card input:focus, #register-card select:focus { border-color:#c07b3a; box-shadow:0 0 0 3px #c07b3a18; }
#register-card .reg-row input { margin-bottom:0; }
#register-card .rpw-wrap { position:relative; margin-bottom:10px; }
#register-card .rpw-wrap input { margin-bottom:0; padding-right:36px; width:100%; }
#register-card .reg-submit {
  width:100%; padding:10px;
  background:linear-gradient(135deg,#d4a060,#a07030);
  color:#fdf3d4; border:none; border-radius:11px;
  font-family:'Playfair Display',serif; font-size:0.95rem;
  cursor:pointer; margin-top:4px; box-shadow:0 4px 14px #a0723850;
  transition:transform 0.15s, box-shadow 0.15s;
}
#register-card .reg-submit:hover { transform:translateY(-2px); box-shadow:0 8px 20px #a0723870; }
#register-card .reg-close {
  position:absolute; top:11px; right:14px;
  background:none; border:none; cursor:pointer; font-size:1.1rem; color:#b08060;
}
#register-card .reg-close:hover { color:#c07b3a; }

/* ══════════════════════════════════════════════
   BUDGET PAGE — full mobile stretch
══════════════════════════════════════════════ */
#budget-page {
  display: none; opacity: 0;
  width: 100%; min-height: 100vh;
  flex-direction: column;
  align-items: center; justify-content: flex-start;
  padding: 0 0 40px 0;
  transform: scale(0.9) translateY(30px);
  transition: opacity 0.9s cubic-bezier(0.22,1,0.36,1),
              transform 0.9s cubic-bezier(0.22,1,0.36,1);
  overflow-y: auto;
}
#budget-page.visible { opacity:1; transform:scale(1) translateY(0); }

/* sticky top bar */
.budget-topbar {
  width: 100%;
  background: linear-gradient(135deg, #d4a060, #a07030);
  padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 3px 12px #a0723840;
  position: sticky; top: 0; z-index: 50;
}
.budget-topbar-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.15rem; color: #fdf3d4;
  display: flex; align-items: center; gap: 8px;
}
.b-logout {
  background: #fdf3d4; border: none;
  border-radius: 8px; padding: 6px 14px;
  font-family: 'Lora', serif; font-size: 0.8rem; color: #7a4a10;
  cursor: pointer; font-weight: 600;
  transition: background 0.15s, transform 0.1s;
}
.b-logout:hover { background: #f5e0a0; transform: scale(1.03); }

/* form card fills width on mobile */
.budget-form-card {
  background: #fdf3d4;
  border: 3px solid #c89a5a;
  border-top: none;
  border-radius: 0 0 24px 24px;
  padding: 22px 18px 28px;
  width: 100%; max-width: 540px;
  margin: 0 auto;
  box-shadow: 0 8px 28px #a0723828;
}

@media (min-width: 560px) {
  .budget-form-card {
    border: 3px solid #c89a5a;
    border-radius: 20px;
    margin-top: 16px;
  }
  .budget-topbar { border-radius: 0; }
}

/* labels */
.b-label {
  display: block;
  font-family: 'Lora', serif; font-weight: 600;
  color: #5a3010; font-size: 0.9rem;
  margin-bottom: 6px; margin-top: 2px;
}
.b-label i { margin-right: 7px; color: #c07b3a; }

/* inputs */
.b-input, .b-select, .b-textarea {
  width: 100%; padding: 13px 14px;
  border-radius: 12px; border: 1.5px solid #d4b07a;
  background: #fffbe8; font-family: 'Lora', serif;
  font-size: 1rem; color: #3a2010;
  margin-bottom: 16px; outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  appearance: none;
}
.b-input:focus, .b-select:focus, .b-textarea:focus {
  border-color: #c07b3a; box-shadow: 0 0 0 3px #c07b3a1a;
}
.b-textarea { resize: vertical; min-height: 80px; }

/* Rp group */
.b-input-group { position: relative; margin-bottom: 16px; }
.b-prefix {
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 48px; display: flex; align-items: center; justify-content: center;
  font-family: 'Lora', serif; font-weight: 700; color: #a07030;
  background: #f5e0a0; border-radius: 12px 0 0 12px;
  border: 1.5px solid #d4b07a; border-right: none;
  font-size: 0.95rem;
}
.b-nominal-display {
  width: 100%; padding: 13px 14px 13px 58px;
  border-radius: 12px; border: 1.5px solid #d4b07a;
  background: #fffbe8; font-family: 'Lora', serif;
  font-size: 1rem; color: #3a2010; outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  cursor: text;
}
.b-nominal-display:focus { border-color: #c07b3a; box-shadow: 0 0 0 3px #c07b3a1a; }

/* submit */
.b-submit {
  width: 100%; padding: 16px;
  background: linear-gradient(135deg, #d4a060, #a07030);
  color: #fdf3d4; border: none; border-radius: 14px;
  font-family: 'Playfair Display', serif; font-size: 1.1rem;
  cursor: pointer; margin-top: 8px;
  box-shadow: 0 5px 18px #a0723855;
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.b-submit:hover { transform: translateY(-2px); box-shadow: 0 9px 24px #a0723870; }
.b-submit:active { transform: scale(0.98); }
.b-submit:disabled { opacity: 0.6; cursor: not-allowed; }

/* status */
.b-status {
  border-radius: 12px; padding: 13px 16px;
  font-family: 'Lora', serif; font-weight: 500; font-size: 0.92rem;
  margin-top: 14px; display: none; text-align: center;
}
.b-status.success { background: #e8f5e0; border: 1.5px solid #7ac05a; color: #3a6020; }
.b-status.error   { background: #fde8e8; border: 1.5px solid #e07060; color: #7a1a10; }

.footer-note { text-align: center; margin-top: 16px; font-size: 0.75rem; color: #b08060; }

/* crumbs */
.crumb {
  position: fixed; border-radius: 3px;
  pointer-events: none; z-index: 999;
  animation: crumbFly var(--dur) ease-out forwards;
}
@keyframes crumbFly {
  0%   { transform:translate(0,0) rotate(0deg); opacity:1; }
  100% { transform:translate(var(--tx),var(--ty)) rotate(var(--rot)); opacity:0; }
}

/* spinner */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { display:inline-block; width:16px; height:16px; border:2.5px solid #fdf3d4cc; border-top-color:#fdf3d4; border-radius:50%; animation:spin 0.7s linear infinite; }
</style>
</head>
<body>

<div id="ant-container"></div>
<canvas id="fireworks-canvas"></canvas>

<!-- ══════════════ LOGIN SCENE ══════════════ -->
<div id="login-scene">
  <p class="login-title">🍞 Input<br>Budgeting</p>
  <div class="scene" id="scene">

    <div class="card-flipper" id="card-flipper">
      <div class="card-inner" id="card-inner">

        <!-- FRONT -->
        <div class="card-front">
          <h2>Log In</h2>
          <input type="text" id="username" placeholder="Username" autocomplete="off">
          <div class="pw-wrap">
            <input type="password" id="password" placeholder="Password">
            <button class="eye-btn" id="eye-btn" tabindex="-1">
              <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <p class="hint">Pull lever to submit</p>
        </div>

        <!-- BACK — richer welcome card -->
        <div class="card-back">
          <div class="wb-deco">🍞</div>
          <p class="wb-title">Selamat<br>Datang!</p>
          <p class="wb-name" id="wb-name-display"></p>
          <div class="wb-divider"></div>
          <p class="wb-sub">Siap mencatat<br>keuangan pernikahan ✨</p>
          <div class="wb-badges">
            <span class="wb-badge">💰 Budget</span>
            <span class="wb-badge">📋 Catatan</span>
            <span class="wb-badge">💍 Nikah</span>
          </div>
        </div>

      </div>
    </div>

    <!-- Toaster -->
    <div class="toaster-wrap" id="toaster-wrap">
      <div class="toaster-slot"></div>
      <div class="heating-bar" id="heating-bar"></div>

      <div class="crack-overlay" id="crack-overlay">
        <svg width="40" height="115" viewBox="0 0 40 115" fill="none">
          <path d="M20 0 L23 18 L16 32 L24 50 L15 68 L22 85 L18 100 L20 115"
                stroke="#1e1208" stroke-width="2.5" stroke-linecap="round"
                stroke-dasharray="200" stroke-dashoffset="200" id="crack-path"/>
          <path d="M20 30 L30 38 L25 45" stroke="#1e1208" stroke-width="1.5" stroke-linecap="round"
                stroke-dasharray="50" stroke-dashoffset="50" id="crack-branch1"/>
          <path d="M20 60 L10 70 L14 78" stroke="#1e1208" stroke-width="1.5" stroke-linecap="round"
                stroke-dasharray="50" stroke-dashoffset="50" id="crack-branch2"/>
        </svg>
      </div>

      <div class="toaster-body" id="toaster-body">
        <div class="toaster-left" id="toaster-left">
          <div class="create-btn-wrap">
            <button class="create-btn" id="create-btn" title="Daftar akun baru">
              <span class="btn-icon">✦</span>
              <span>New<br>Account</span>
            </button>
          </div>
        </div>
        <div class="toaster-right" id="toaster-right">
          <div class="lever-wrap" id="lever">
            <span class="lever-label top">OFF</span>
            <div class="lever-track">
              <div class="lever-knob" id="lever-knob"></div>
            </div>
            <span class="lever-label bot">ON</span>
          </div>
        </div>
      </div>

      <!-- Register card -->
      <div id="register-card">
        <button class="reg-close" id="reg-close">✕</button>
        <h2>✦ Buat Akun</h2>
        <div class="reg-row">
          <input type="text" id="reg-firstname" placeholder="Nama Depan">
          <input type="text" id="reg-lastname"  placeholder="Nama Belakang">
        </div>
        <input type="text"  id="reg-username" placeholder="Username" autocomplete="off">
        <input type="email" id="reg-email"    placeholder="Alamat Email">
        <input type="tel"   id="reg-phone"    placeholder="Nomor HP">
        <select id="reg-dob"><option value="" disabled selected>Tanggal Lahir</option></select>
        <div class="rpw-wrap">
          <input type="password" id="reg-password" placeholder="Password">
          <button class="eye-btn" id="reg-eye-btn" tabindex="-1">
            <svg id="reg-eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="rpw-wrap">
          <input type="password" id="reg-confirm" placeholder="Konfirmasi Password">
          <button class="eye-btn" id="reg-eye-btn2" tabindex="-1">
            <svg id="reg-eye-icon2" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <button class="reg-submit" id="reg-submit">Buat Akun 🍞</button>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════ BUDGET PAGE ══════════════ -->
<div id="budget-page">
  <!-- sticky top bar -->
  <div class="budget-topbar">

<script>
/* ════════════════════════════════════════════
   NOMINAL — format ribuan otomatis
════════════════════════════════════════════ */
const nominalDisplay = document.getElementById('f-nominal-display');
const nominalRaw     = document.getElementById('f-nominal-raw');

nominalDisplay.addEventListener('input', () => {
  // strip everything except digits
  const digits = nominalDisplay.value.replace(/\D/g,'');
  nominalRaw.value = digits;
  // format with dot-thousand separator (ID locale)
  if (digits) {
    nominalDisplay.value = Number(digits).toLocaleString('id-ID');
  }
});

// allow only numeric keys
nominalDisplay.addEventListener('keydown', e => {
  const allowed = ['Backspace','Delete','ArrowLeft','ArrowRight','Tab','Home','End'];
  if (!allowed.includes(e.key) && !/^\d$/.test(e.key)) e.preventDefault();
});


/* ════════════════════════════════════════════

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzeiNEGNtrQkGLgJOG4b09TqTx-0USu_3PeLv6-AVWXn5y311ui0W_lMByfBWkJrCGcag/exec";


/* ════════════════════════════════════════════
   SIMPAN TRANSAKSI
════════════════════════════════════════════ */
function simpanTransaksi() {
  const tanggal    = document.getElementById('f-tanggal').value;
  const jenis      = document.getElementById('f-jenis').value;
  const kategori   = document.getElementById('f-kategori').value;
  const nominal    = nominalRaw.value;           // raw digits
  const keterangan = document.getElementById('f-keterangan').value;
  const statusDiv  = document.getElementById('b-status');
  const btn        = document.getElementById('btn-simpan');

  if (!tanggal || !jenis || !kategori || !nominal) {
    statusDiv.textContent = '⚠️ Lengkapi semua field yang wajib diisi.';
    statusDiv.className = 'b-status error';
    statusDiv.style.display = 'block';
    setTimeout(() => statusDiv.style.display = 'none', 4000);
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Menyimpan...';

  const data = { tanggal, jenis, kategori, nominal: Number(nominal), keterangan };

  fetch(WEB_APP_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  })
  .then(() => {
    /* ─ SUCCESS ─ */
    const r = btn.getBoundingClientRect();
    launchFW(r.left + r.width / 2, r.top + r.height / 2);
    setTimeout(() => launchFW(), 400);
    setTimeout(() => launchFW(), 800);
    setTimeout(() => launchFW(), 1200);

    statusDiv.textContent = '✨ Transaksi berhasil dicatat!';
    statusDiv.className = 'b-status success';
    statusDiv.style.display = 'block';

    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Simpan Transaksi';

    // reset form
    document.getElementById('f-jenis').value = '';
    document.getElementById('f-kategori').value = '';
    nominalDisplay.value = '';
    nominalRaw.value = '';
    document.getElementById('f-keterangan').value = '';
    setTodayDate();

    // logout setelah 3 detik
    setTimeout(() => { statusDiv.style.display = 'none'; doLogout(); }, 3000);
  })
  .catch(err => {
    /* ─ FAIL — stay on form ─ */
    statusDiv.textContent = '❌ Gagal mengirim: ' + err.message;
    statusDiv.className = 'b-status error';
    statusDiv.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Simpan Transaksi';
    setTimeout(() => statusDiv.style.display = 'none', 5000);
  });
}

function setTodayDate() {
  const t = new Date();
  const yyyy = t.getFullYear();
  const mm = String(t.getMonth()+1).padStart(2,'0');
  const dd = String(t.getDate()).padStart(2,'0');
  const el = document.getElementById('f-tanggal');
  if (el) el.value = `${yyyy}-${mm}-${dd}`;
}


/* ════════════════════════════════════════════
   FIREWORKS — full rainbow palette
════════════════════════════════════════════ */
const canvas = document.getElementById('fireworks-canvas');
const ctx    = canvas.getContext('2d');
let fwParticles = [];

function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

const FW_COLORS = [
  '#ff4d4d','#ff8c42','#ffd700','#7fff00','#00e5ff',
  '#4d79ff','#bf5fff','#ff69b4','#ff1493','#00ff7f',
  '#ffffff','#ffe680','#ff6347','#40e0d0','#ee82ee',
  '#adff2f','#1e90ff','#fa8072','#7fffd4','#ffa500'
];

class FWParticle {
  constructor(x,y,color) {
    this.x=x; this.y=y; this.color=color;
    this.vx=(Math.random()-0.5)*(Math.random()*16);
    this.vy=(Math.random()-0.5)*(Math.random()*16);
    this.alpha=1; this.friction=0.95; this.gravity=0.18;
    this.size = 1.5 + Math.random()*2;
  }
  draw() {
    ctx.save(); ctx.globalAlpha=this.alpha; ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fillStyle=this.color;
    ctx.shadowBlur=14; ctx.shadowColor=this.color;
    ctx.fill(); ctx.restore();
  }
  update() {
    this.vx*=this.friction; this.vy*=this.friction;
    this.vy+=this.gravity; this.x+=this.vx; this.y+=this.vy;
    this.alpha-=0.013;
  }
}

function launchFW(tx, ty) {
  const isTarget = tx !== undefined;
  const count = isTarget ? 1 : Math.floor(Math.random()*4)+3;
  for (let i=0; i<count; i++) {
    const x = tx || Math.random()*canvas.width;
    const y = ty || Math.random()*(canvas.height*0.65);
    // pick a random burst palette (4–6 colors per burst for rainbow effect)
    const palette = [...FW_COLORS].sort(()=>Math.random()-0.5).slice(0,6);
    for (let j=0; j<80; j++) {
      fwParticles.push(new FWParticle(x, y, palette[j % palette.length]));
    }
  }
}

(function animFW(){
  requestAnimationFrame(animFW);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  fwParticles = fwParticles.filter(p=>p.alpha>0);
  fwParticles.forEach(p=>{ p.update(); p.draw(); });
})();

function animateCrack(){
  const path=document.getElementById('crack-path');
  const b1=document.getElementById('crack-branch1');
  const b2=document.getElementById('crack-branch2');
  document.getElementById('crack-overlay').classList.add('visible');
  let st=null;
  function drawMain(ts){
    if(!st)st=ts;
    const p=Math.min((ts-st)/420,1);
    path.style.strokeDashoffset=200*(1-p);
    if(p<1)requestAnimationFrame(drawMain);
    else{
      let s2=null;
      function drawBr(ts2){
        if(!s2)s2=ts2;
        const p2=Math.min((ts2-s2)/200,1);
        b1.style.strokeDashoffset=50*(1-p2);
        b2.style.strokeDashoffset=50*(1-p2);
        if(p2<1)requestAnimationFrame(drawBr);
      }
      requestAnimationFrame(drawBr);
    }
  }
  requestAnimationFrame(drawMain);
}

function spawnCrumbs(cx,cy){
  const colors=['#c89a5a','#a07030','#8ab4d4','#fdf3d4','#d4b07a','#f5c9a8'];
  for(let i=0;i<26;i++){
    const el=document.createElement('div');
    el.className='crumb';
    const size=4+Math.random()*9;
    const angle=(Math.PI*2*i/26)+(Math.random()-0.5)*0.7;
    const dist=70+Math.random()*130;
    el.style.cssText=`width:${size}px;height:${size}px;background:${colors[i%colors.length]};left:${cx-size/2}px;top:${cy-size/2}px;--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;--rot:${(Math.random()-0.5)*720}deg;--dur:${0.5+Math.random()*0.6}s;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1300);
  }
}

/* shared hidden SVG path for getPointAtLength */
const _svgNS = 'http://www.w3.org/2000/svg';
const _pathEl = document.createElementNS(_svgNS,'path');

function getPointOnPath(pathStr, t) {
  _pathEl.setAttribute('d', pathStr);
  const len = _pathEl.getTotalLength();
  const pt  = _pathEl.getPointAtLength(len * t);
  const eps = 0.001;
  const t2  = Math.min(1, t + eps);
  const pt2 = _pathEl.getPointAtLength(len * t2);
  const angle = Math.atan2(pt2.y - pt.y, pt2.x - pt.x) * 180 / Math.PI;
  return { x: pt.x, y: pt.y, angle };
}

function createAnt(pathFn, durSec, delaySec) {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;will-change:transform;';
  wrap.innerHTML = ANT_SVG;
  antContainer.appendChild(wrap);

  const svg   = wrap.querySelector('svg');
  // collect leg endpoint lines for wiggle (every other line in DOM order)
  const allLines = Array.from(svg.querySelectorAll('line'));
  // odd-indexed lines are the "lower segment" — we wiggle their y2
  const wiggleLines = allLines.filter((_,i) => i % 2 === 1);

  const totalMs = durSec  * 1000;
  const delayMs = delaySec * 1000;
  let startTime = null;

  // store original y2 values
  const origY2 = wiggleLines.map(l => parseFloat(l.getAttribute('y2')));
  const origX2 = wiggleLines.map(l => parseFloat(l.getAttribute('x2')));

  function tick(ts) {
    if (!startTime) startTime = ts + delayMs;
    const elapsed = ts - startTime;
    if (elapsed < 0) { wrap.style.opacity = '0'; requestAnimationFrame(tick); return; }

    const t = (elapsed % totalMs) / totalMs;
    const W = window.innerWidth, H = window.innerHeight;
    const { x, y, angle } = getPointOnPath(pathFn(W, H), t);

    /* leg wiggle — tripod gait: legs 0,2,4 vs 1,3,5 alternate */
    const freq  = 5;
    const phase = (elapsed / 1000) * freq * Math.PI * 2;
    const amp   = 4;
    wiggleLines.forEach((ln, idx) => {
      const sign = idx % 2 === 0 ? 1 : -1;
      const w = Math.sin(phase + idx * 1.05) * amp * sign;
      ln.setAttribute('y2', origY2[idx] + w);
      // also shift x2 slightly for more organic feel
      ln.setAttribute('x2', origX2[idx] + Math.cos(phase + idx * 1.05) * amp * 0.5 * sign);
    });

    wrap.style.opacity  = '1';
    wrap.style.transform = `translate(${x}px,${y}px) rotate(${angle}deg) translate(-20px,-10px)`;
    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
}

ANT_PATHS.forEach((fn,i) => createAnt(fn, ANT_DUR[i], ANT_DELAY[i]));
</script>
