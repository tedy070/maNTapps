<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

  <style>
    body { 
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      padding: 15px 0;
    }
    .form-container { 
      background: white; 
      padding: 30px 20px; 
      border-radius: 20px; 
      box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
      border: 1px solid rgba(255,255,255,0.3);
      width: 100%;
      margin-bottom: 20px;
    }
    .header-title {
      color: #4a4a4a;
      font-weight: 600;
      margin-bottom: 25px;
      font-size: 1.4rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .form-label {
      font-weight: 600;
      color: #444;
      margin-bottom: 10px;
      font-size: 1rem;
    }
    .form-label i {
      margin-right: 8px;
      color: #6c5ce7;
    }
    .form-control, .form-select, .input-group-text {
      border-radius: 12px !important;
      padding: 14px; 
      font-size: 16px !important; 
      border: 1px solid #ced4da;
      transition: all 0.3s ease;
    }
    .form-control:focus, .form-select:focus {
      border-color: #6c5ce7;
      box-shadow: 0 0 0 0.25rem rgba(108, 92, 231, 0.1);
    }
    .btn-submit {
      background: linear-gradient(to right, #6c5ce7, #a29bfe);
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-weight: 600;
      font-size: 1.1rem;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 10px;
      color: white;
    }
    .btn-submit:active { transform: scale(0.98); }
    #status {
      border-radius: 12px;
      padding: 15px;
      font-weight: 500;
      font-size: 0.95rem;
      margin-top: 20px;
    }
    @media (max-width: 576px) {
      .container { padding-left: 10px; padding-right: 10px; }
      .form-container { padding: 25px 15px; }
    }
    /* CONTAINER UNTUK JALUR SEMUT */
#ant-invasion-container {
  position: fixed;
  inset: 0;
  pointer-events: none; /* Agar tidak menghalangi klik button aplikasi */
  z-index: 100; /* Paling atas */
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

/* GAMBAR SEMUT (SVG) */
.ant {
  width: 16px; /* Ukuran semut kecil */
  height: 16px;
  position: absolute;
  /* Warna Semut: Hitam agar terlihat di atas Glassmorphism */
  background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><ellipse cx="50" cy="50" rx="40" ry="20" fill="black"/><ellipse cx="20" cy="50" rx="15" ry="10" fill="black"/><ellipse cx="80" cy="50" rx="15" ry="10" fill="black"/><line x1="10" y1="20" x2="30" y2="40" stroke="black" stroke-width="5"/><line x1="90" y1="20" x2="70" y2="40" stroke="black" stroke-width="5"/><line x1="10" y1="80" x2="30" y2="60" stroke="black" stroke-width="5"/><line x1="90" y1="80" x2="70" y2="60" stroke="black" stroke-width="5"/></svg>');
  background-size: contain;
  background-repeat: no-repeat;
  
  /* Logika Pergerakan */
  offset-path: path('M -20 50 Q 50 -20, 120 50 T 260 50'); /* Jalur acak dari kiri ke kanan */
  offset-rotate: auto;
  animation: ant-march-real 10s linear infinite;
}

/* Jeda Waktu Berjalan untuk Masing-masing Semut */
.ant:nth-child(1) { animation-delay: 0s; }
.ant:nth-child(2) { animation-delay: 2s; }
.ant:nth-child(3) { animation-delay: 4s; }
.ant:nth-child(4) { animation-delay: 6s; }

/* ANIMASI GERAK */
@keyframes ant-march-real {
  0% { offset-distance: 0%; opacity: 0; }
  5% { opacity: 1; }
  95% { opacity: 1; }
  100% { offset-distance: 100%; opacity: 0; }
}
  </style>
</head>
<body>
  <div id="ant-invasion-container">
  <div class="ant"></div>
</div>

  <canvas id="fireworks-canvas" 
        style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:99;">
</canvas>
  
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="form-container">
          <h3 class="text-center header-title">
            <i class="fa-solid fa-heart-circle-check text-danger me-2"></i>Wedding Budgeting
          </h3>
          
          <form id="financeForm">
            <div class="mb-3">
              <label class="form-label"><i class="fa-solid fa-calendar-days"></i>Tanggal</label>
              <input type="date" class="form-control" name="tanggal" id="tanggalInput" required>
            </div>

            <div class="mb-3">
              <label class="form-label"><i class="fa-solid fa-arrow-right-arrow-left"></i>Jenis Transaksi</label>
              <select class="form-select" name="jenis" required>
                <option value="" disabled selected>Pilih Jenis Transaksi...</option>
                <option value="Income">Income (Pemasukan)</option>
                <option value="Expenses">Expenses (Pengeluaran)</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label"><i class="fa-solid fa-tag"></i>Kategori</label>
              <select class="form-select" name="kategori" required>
                <option value="" disabled selected>Pilih Kategori...</option>
                <optgroup label="Pemasukan">
                  <option value="Tabungan">Tabungan</option>
                  <option value="Bonus">Bonus</option>
                </optgroup>
                <optgroup label="Pengeluaran">
                  <option value="Administrasi Persiapan Pernikahan">Administrasi Persiapan</option>
                  <option value="Prayer Sett">Prayer Set</option>
                  <option value="Toiletries">Toiletries</option>
                  <option value="Skincare/Make Up">Skincare & Make Up</option>
                  <option value="Clothes">Clothes</option>
                  <option value="Mahar/Souvenir">Mahar & Souvenir</option>
                  <option value="Invitation">Invitation</option>
                  <option value="Lain-Lain">Lain-Lain</option>
                </optgroup>
                <option value="Lainnya">Lainnya</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label"><i class="fa-solid fa-money-bill-wave"></i>Nominal</label>
              <div class="input-group">
                <span class="input-group-text bg-light">Rp</span>
                <input type="number" class="form-control" name="nominal" placeholder="0" inputmode="numeric" required>
              </div>
            </div>

            <div class="mb-4">
                <label class="form-label"><i class="fa-solid fa-pen-to-square"></i>Keterangan</label>
                <textarea class="form-control" name="keterangan" rows="2" placeholder="Catat sesuai yang berkaitan contoh Tedy,Nadya,Mukena,Sajadah..."></textarea>
              </div>

            <button type="submit" class="btn btn-primary btn-submit w-100">
              <i class="fa-solid fa-paper-plane me-2"></i>Simpan Transaksi
            </button>
          </form>

          <div id="status" class="mt-3 text-center alert" style="display:none;"></div>
        </div>
        
        <p class="text-center mt-3 text-muted" style="font-size: 0.8rem;">
          &copy; 2026 Wedding Planner Ledger
        </p>
      </div>
    </div>
  </div>

  <script>
  // 1. Inisialisasi URL dan Canvas (Lakukan di awal agar tidak undefined)
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyHRjVSJEoK4D53q9L46y36e_eL5DgwyyEKTH3i7qBLCJ-Blkbehe3ACGl5eyWMkoYyQA/exec";
  const canvas = document.getElementById('fireworks-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // 2. Class Particle (Logika per partikel)
  class Particle {
    constructor(x, y, color) {
      this.x = x;
      this.y = y;
      this.color = color;
      this.velocity = {
        x: (Math.random() - 0.5) * (Math.random() * 12),
        y: (Math.random() - 0.5) * (Math.random() * 12)
      };
      this.alpha = 1;
      this.friction = 0.96;
      this.gravity = 0.15;
    }

    draw() {
      ctx.save();
      ctx.globalAlpha = this.alpha;
      ctx.beginPath();
      ctx.arc(this.x, this.y, 1.5, 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.shadowBlur = 10;
      ctx.shadowColor = this.color;
      ctx.fill();
      ctx.restore();
    }

    update() {
      this.velocity.x *= this.friction;
      this.velocity.y *= this.friction;
      this.velocity.y += this.gravity;
      this.x += this.velocity.x;
      this.y += this.velocity.y;
      this.alpha -= 0.015;
    }
  }

  // 3. Fungsi Launch Fireworks (Sudah mendukung parameter x, y)
  function launchFireworks(targetX, targetY) {
    const explosionCount = targetX !== undefined ? 1 : Math.floor(Math.random() * 3) + 3;
    const colors = ['#bef264', '#ffffff', '#38bdf8', '#fb923c', '#f472b6', '#a78bfa'];

    for (let i = 0; i < explosionCount; i++) {
      // Gunakan koordinat tombol jika ada, jika tidak gunakan acak
      const x = targetX || Math.random() * canvas.width;
      const y = targetY || Math.random() * (canvas.height * 0.7);
      
      for (let j = 0; j < 60; j++) {
        particles.push(new Particle(x, y, colors[Math.floor(Math.random() * colors.length)]));
      }
    }
  }

  // 4. Animasi Loop
  function animateFireworks() {
    requestAnimationFrame(animateFireworks);
    ctx.fillStyle = 'rgba(15, 23, 42, 0.1)'; 
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    particles.forEach((particle, index) => {
      if (particle.alpha > 0) {
        particle.update();
        particle.draw();
      } else {
        particles.splice(index, 1);
      }
    });
  }
  animateFireworks();

  // 5. Submit Form dengan Trigger Kembang Api
  document.getElementById('financeForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const btn = e.target.querySelector('button');
    const rect = btn.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;

    const form = e.target;
    const statusDiv = document.getElementById('status');
    
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Processing...';

    const formData = new FormData(form);
    const data = {};
    formData.forEach((value, key) => data[key] = value);

    fetch(WEB_APP_URL, {
      method: "POST",
      mode: "no-cors", 
      body: JSON.stringify(data),
    })
    .then(() => {
      // Ledakan utama tepat di tombol
      launchFireworks(centerX, centerY);
      
      // Ledakan tambahan di area atas agar ramai
      setTimeout(() => launchFireworks(), 400);
      setTimeout(() => launchFireworks(), 800);

      statusDiv.innerText = "✨ Transaksi Berhasil Dicatat!";
      statusDiv.style.display = 'block';
      statusDiv.className = "mt-3 text-center alert alert-success";
      
      form.reset();
      document.getElementById('tanggalInput').valueAsDate = new Date();
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-paper-plane me-2"></i>Simpan Transaksi';
      
      setTimeout(() => { statusDiv.style.display = 'none'; }, 5000);
    })
    .catch(err => {
      alert("Masalah: " + err);
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-paper-plane me-2"></i>Simpan Transaksi';
    });
  });

  // Set default tanggal hari ini
  document.getElementById('tanggalInput').valueAsDate = new Date();
</script>
</body>
</html>
