  background: #f5c9a8;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-family: 'Lora', serif;
  overflow-x: hidden;
  overflow-y: auto;
}

/* ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ
   REALISTIC ANT
ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ */
#ant-container {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 200;
  overflow: hidden;
}

.ant-svg {
  position: absolute;
  width: 28px; height: 28px;
  will-change: transform;
}

/* ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ
   FIREWORKS CANVAS
ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ */
#fireworks-canvas {
  position: fixed; top:0; left:0;
  width:100%; height:100%;
  pointer-events: none; z-index: 190;
}

/* ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ
   LOGIN SCENE
ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ */
#login-scene {
  display: flex; flex-direction: column; align-items: center;
  transition: opacity 0.8s ease, transform 0.8s ease;
}
#login-scene.fade-out {
  opacity: 0; transform: scale(0.93) translateY(24px);
  pointer-events: none;
}

.login-title {
  font-family: 'Playfair Display', serif;
  font-size: 2.4rem; color: #2a1a0e;
  margin-bottom: 18px; letter-spacing: -1px;
  text-align: center; line-height: 1.2;
}

.scene {
  display: flex; flex-direction: column;
  align-items: center; position: relative;
}

/* ŌöĆŌöĆ LOGIN CARD ŌöĆŌöĆ */
.card-flipper {
  width: 280px; height: 270px;
  position: relative; z-index: 5;
  perspective: 1000px; margin-bottom: -10px;
}
.card-inner {
  width: 100%; height: 100%;
  position: relative; transform-style: preserve-3d;
}
.card-front, .card-back {
  position: absolute; inset: 0;
  border-radius: 20px 20px 12px 12px;
  border: 5px solid #c89a5a; background: #fdf3d4;
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 22px 26px 18px;
  box-shadow: 0 6px 28px #a0723850;
}
.card-back {
  transform: rotateY(180deg);
  background: linear-gradient(150deg, #fdf3d4 55%, #f5e5a8);
}
.card-front h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.35rem; color: #3a2010; margin-bottom: 15px;
}
.card-front input {
  width: 100%; padding: 9px 13px; border-radius: 10px;
  border: 1.5px solid #d4b07a; background: #fffbe8;
  font-family: 'Lora', serif; font-size: 0.9rem; color: #3a2010;
  margin-bottom: 10px; outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.card-front input:focus { border-color: #c07b3a; box-shadow: 0 0 0 3px #c07b3a1a; }
.pw-wrap { position: relative; width: 100%; margin-bottom: 10px; }
.pw-wrap input { margin-bottom: 0; padding-right: 38px; width: 100%; }
.eye-btn {
  position: absolute; right: 10px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: #b08060; display: flex; align-items: center;
  padding: 0; transition: color 0.2s;
}
.eye-btn:hover { color: #c07b3a; }
.hint { font-size: 0.74rem; color: #b08060; font-style: italic; margin-top: 2px; }
.card-back .wb-icon { font-size: 3.8rem; margin-bottom: 16px; }
.card-back .wb-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.75rem; color: #5a3010;
  text-align: center; line-height: 1.35;
}
.card-back .wb-sub {
  font-size: 0.88rem; color: #a07040;
  margin-top: 12px; font-style: italic; text-align: center;
  line-height: 1.5;
}

/* ŌöĆŌöĆ TOASTER BODY ŌöĆŌöĆ */
.toaster-wrap { position: relative; width: 320px; z-index: 10; }
.toaster-body { width: 100%; height: 115px; position: relative; }
.toaster-left, .toaster-right {
  position: absolute; top: 0; height: 100%;
  background: linear-gradient(175deg, #b8d4ee 0%, #8ab4d4 100%);
  transition: transform 0.5s cubic-bezier(0.4,0,0.2,1), opacity 0.4s ease;
  overflow: hidden;
}
.toaster-left  { left:0; width:50%; border-radius:16px 0 0 22px; box-shadow:-4px 8px 20px #5070a040,inset 2px 2px 8px #ffffff70; }
.toaster-right { right:0; width:50%; border-radius:0 16px 22px 0; box-shadow:4px 8px 20px #5070a040,inset -2px 2px 8px #ffffff70; }
.toaster-slot {
  position: absolute; top:-9px; left:50%; transform:translateX(-50%);
  width:210px; height:15px; background:#1e1208;
  border-radius:8px 8px 0 0; z-index:12; pointer-events:none;
}
.crack-overlay {
  position: absolute; top:0; left:50%; transform:translateX(-50%);
  width:40px; height:115px; z-index:15; pointer-events:none;
  opacity:0; transition:opacity 0.2s;
}
.crack-overlay.visible { opacity:1; }
.heating-bar {
  position: absolute; top:-3px; left:50%; transform:translateX(-50%);
  width:210px; height:6px; background:transparent;
  border-radius:0 0 5px 5px;
  transition: background 0.5s, box-shadow 0.5s; z-index:13;
}
.heating-bar.active { background:#e84010; box-shadow:0 0 20px 5px #e8401085; }
.toaster-left.split  { transform:translateX(-62px) rotate(-3deg); opacity:0.7; }
.toaster-right.split { transform:translateX( 62px) rotate( 3deg); opacity:0.7; }
@keyframes shake {
  0%,100%{ transform:translateX(0) rotate(0deg); }
  15%{ transform:translateX(-4px) rotate(-1deg); }
  30%{ transform:translateX(5px) rotate(1.5deg); }
  45%{ transform:translateX(-5px) rotate(-1.5deg); }
  60%{ transform:translateX(4px) rotate(1deg); }
  75%{ transform:translateX(-3px) rotate(-0.5deg); }
}
.toaster-body.shaking { animation:shake 0.45s ease; }

/* ŌöĆŌöĆ CREATE BTN ŌöĆŌöĆ */
.create-btn-wrap { position:absolute; left:12px; top:50%; transform:translateY(-50%); z-index:20; }
.create-btn {
  width:56px; height:56px;
  background:linear-gradient(145deg,#fdf3d4,#f0d898);
  border:2.5px solid #c89a5a; border-radius:11px;
  cursor:pointer; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:3px;
  box-shadow:0 4px 12px #a0723850,inset 0 1px 3px #ffffff90;
  transition:transform 0.15s, box-shadow 0.15s;
  font-family:'Lora',serif; font-size:0.52rem; color:#7a4a10;
  text-align:center; line-height:1.2;
}
.create-btn:hover { transform:translateY(-2px); box-shadow:0 7px 18px #a0723870; }
.create-btn:active { transform:translateY(1px); }
.create-btn .btn-icon { font-size:1.15rem; line-height:1; }

/* ŌöĆŌöĆ LEVER ŌöĆŌöĆ */
.lever-wrap {
  position:absolute; right:26px; top:8px;
  display:flex; flex-direction:column; align-items:center;
  z-index:20; cursor:pointer; user-select:none;
}
.lever-label { font-family:'Lora',serif; font-size:0.6rem; font-weight:600; color:#1e1208; letter-spacing:1px; }
.lever-label.top { margin-bottom:3px; }
.lever-label.bot { margin-top:3px; }
.lever-track { width:5px; height:70px; background:#1e1208; border-radius:4px; position:relative; }
.lever-knob {
  width:24px; height:24px;
  background:radial-gradient(circle at 35% 30%,#ff7070,#bb1818);
  border-radius:50%; border:3px solid #880000;
  position:absolute; left:50%; transform:translateX(-50%);
  top:0; box-shadow:0 3px 10px #bb181870;
  transition:top 0.55s cubic-bezier(0.34,1.56,0.64,1); cursor:grab;
}
.lever-knob.pulled { top:46px; }

/* ŌöĆŌöĆ REGISTER CARD ŌöĆŌöĆ */
#register-card {
  position:absolute;
  left:50%; transform:translateX(-50%) translateY(40px) scale(0.85);
  top:0; width:290px;
  background:#fdf3d4; border:5px solid #c89a5a; border-radius:20px;
  padding:26px 26px 22px; box-shadow:0 8px 36px #a0723870;
  z-index:50; opacity:0; pointer-events:none;
  transition:opacity 0.55s cubic-bezier(0.22,1,0.36,1), transform 0.55s cubic-bezier(0.22,1,0.36,1);
  overflow-y: auto; max-height: 460px;
}
#register-card.open {
  opacity:1; pointer-events:all;
  transform:translateX(-50%) translateY(-300px) scale(1);
}
#register-card h2 { font-family:'Playfair Display',serif; font-size:1.2rem; color:#3a2010; text-align:center; margin-bottom:14px; }
#register-card .reg-row { display:flex; gap:8px; margin-bottom:10px; }
#register-card input, #register-card select {
  width:100%; padding:8px 12px; border-radius:10px;
  border:1.5px solid #d4b07a; background:#fffbe8;
  font-family:'Lora',serif; font-size:0.85rem; color:#3a2010;
  margin-bottom:10px; outline:none;
  transition:border-color 0.2s, box-shadow 0.2s; appearance:none;
}
#register-card input:focus, #register-card select:focus { border-color:#c07b3a; box-shadow:0 0 0 3px #c07b3a18; }
#register-card .reg-row input { margin-bottom:0; }
#register-card .rpw-wrap { position:relative; margin-bottom:10px; }
#register-card .rpw-wrap input { margin-bottom:0; padding-right:36px; width:100%; }
#register-card .reg-submit {
  width:100%; padding:10px;
  background:linear-gradient(135deg,#d4a060,#a07030);
  color:#fdf3d4; border:none; border-radius:11px;
  font-family:'Playfair Display',serif; font-size:0.95rem;
  cursor:pointer; margin-top:4px; box-shadow:0 4px 14px #a0723850;
  transition:transform 0.15s, box-shadow 0.15s;
}
#register-card .reg-submit:hover { transform:translateY(-2px); box-shadow:0 8px 20px #a0723870; }
#register-card .reg-close {
  position:absolute; top:11px; right:14px;
  background:none; border:none; cursor:pointer; font-size:1.1rem; color:#b08060;
}
#register-card .reg-close:hover { color:#c07b3a; }

/* ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ
   BUDGET PAGE
ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ */
#budget-page {
  display: none; opacity: 0;
  width: 100%;
  flex-direction: column;
  align-items: center; justify-content: flex-start;
  padding: 0 0 60px 0;
  transform: scale(0.9) translateY(30px);
  transition: opacity 0.9s cubic-bezier(0.22,1,0.36,1),
              transform 0.9s cubic-bezier(0.22,1,0.36,1);
}
#budget-page.visible { opacity:1; transform:scale(1) translateY(0); }

/* sticky top bar */
.budget-topbar {
  position: sticky; top: 0; z-index: 60;
  width: 100%;
  background: linear-gradient(135deg, #d4a060, #a07030);
  padding: 10px 14px 8px 16px;
  display: flex; flex-direction: column;
  align-items: center;
  box-shadow: 0 3px 14px #a0723850;
}
.budget-topbar-row {
  width: 100%; max-width: 480px;
  display: flex; align-items: center; justify-content: flex-end;
  gap: 8px;
}
.ant-toggle-btn {
  background: #fdf3d4cc; border: 1px solid #c89a5a;
  border-radius: 6px; padding: 3px 8px;
  font-family: 'Lora', serif; font-size: 0.68rem;
  color: #7a4a10; cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  display: flex; align-items: center; gap: 4px;
  white-space: nowrap;
}
.ant-toggle-btn:hover { background: #f5e0a0; transform: scale(1.04); }
.ant-toggle-btn.ant-off { opacity: 0.6; text-decoration: line-through; }
.budget-topbar-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.15rem; color: #fdf3d4;
  display: flex; align-items: center; gap: 8px;
  margin-top: 7px; text-align: center;
}
.budget-card {
  background: #fdf3d4;
  border: 3px solid #c89a5a;
  border-top: none;
  border-radius: 0 0 20px 20px;
  padding: 22px 16px 30px;
  width: 100%; max-width: 480px;
  margin: 0 auto;
  box-shadow: 0 8px 28px #a0723828;
}
@media (min-width: 500px) {
  .budget-card { border: 3px solid #c89a5a; border-radius: 20px; margin-top: 14px; }
}
.budget-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem; color: #3a2010;
  text-align: center; margin-bottom: 22px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}

/* form labels */
.b-label {
  display: block;
  font-family: 'Lora', serif; font-weight: 600;
  color: #5a3010; font-size: 0.88rem;
  margin-bottom: 6px;
}
.b-label i { margin-right: 6px; color: #c07b3a; }

/* inputs */
.b-input, .b-select, .b-textarea {
  width: 100%; padding: 11px 14px;
  border-radius: 12px; border: 1.5px solid #d4b07a;
  background: #fffbe8; font-family: 'Lora', serif;
  font-size: 0.92rem; color: #3a2010;
  margin-bottom: 14px; outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  appearance: none;
}
.b-input:focus, .b-select:focus, .b-textarea:focus {
  border-color: #c07b3a; box-shadow: 0 0 0 3px #c07b3a1a;
}
.b-textarea { resize: vertical; min-height: 68px; }

/* input group rp */
.b-input-group { position: relative; margin-bottom: 14px; }
.b-input-group .b-prefix {
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 44px; display: flex; align-items: center; justify-content: center;
  font-family: 'Lora', serif; font-weight: 600; color: #a07030;
  background: #f5e0a0; border-radius: 12px 0 0 12px;
  border: 1.5px solid #d4b07a; border-right: none;
  font-size: 0.9rem;
}
.b-input-group .b-input { padding-left: 54px; margin-bottom: 0; }

/* submit button */
.b-submit {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, #d4a060, #a07030);
  color: #fdf3d4; border: none; border-radius: 13px;
  font-family: 'Playfair Display', serif; font-size: 1.05rem;
  cursor: pointer; margin-top: 6px;
  box-shadow: 0 5px 16px #a0723855;
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.b-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 22px #a0723870; }
.b-submit:active { transform: scale(0.98); }
.b-submit:disabled { opacity: 0.6; cursor: not-allowed; }

/* status */
.b-status {
  border-radius: 12px; padding: 12px 16px;
  font-family: 'Lora', serif; font-weight: 500; font-size: 0.9rem;
  margin-top: 16px; display: none; text-align: center;
}
.b-status.success { background: #e8f5e0; border: 1.5px solid #7ac05a; color: #3a6020; }
.b-status.error   { background: #fde8e8; border: 1.5px solid #e07060; color: #7a1a10; }

/* logout btn - small */
.b-logout {
  background: #fdf3d4; border: none;
  border-radius: 6px; padding: 4px 10px;
  font-family: 'Lora', serif; font-size: 0.72rem;
  color: #7a4a10; cursor: pointer; font-weight: 600;
  transition: background 0.15s, transform 0.1s;
  white-space: nowrap;
}

<!-- ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ
     JAVASCRIPT
ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ -->
<script>
/* ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ
   REALISTIC ANT ENGINE
ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ */
const ANT_SVG_TEMPLATE = `
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 60" width="36" height="18">
  <!-- Head -->
  <ellipse cx="100" cy="30" rx="11" ry="10" fill="#1a1008"/>
  <!-- Antennae -->
  <line x1="108" y1="22" x2="118" y2="10" stroke="#1a1008" stroke-width="2" stroke-linecap="round"/>
  <line x1="104" y1="20" x2="112" y2="8"  stroke="#1a1008" stroke-width="2" stroke-linecap="round"/>
  <circle cx="118" cy="10" r="2" fill="#1a1008"/>
  <circle cx="112" cy="8"  r="2" fill="#1a1008"/>
  <!-- Thorax -->
  <ellipse cx="76" cy="30" rx="13" ry="10" fill="#241608"/>
  <!-- Abdomen -->
  <ellipse cx="46" cy="30" rx="20" ry="14" fill="#1a1008"/>
  <!-- Shine on abdomen -->
  <ellipse cx="42" cy="24" rx="8" ry="4" fill="#2e2010" opacity="0.5"/>
  <!-- Legs (3 per side, alternating angles for realism) -->
  <!-- Left legs -->
  <line x1="68" y1="32" x2="52" y2="48" stroke="#1a1008" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="52" y1="48" x2="44" y2="58" stroke="#1a1008" stroke-width="1.8" stroke-linecap="round"/>

  <line x1="76" y1="38" x2="60" y2="54" stroke="#1a1008" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="60" y1="54" x2="50" y2="60" stroke="#1a1008" stroke-width="1.8" stroke-linecap="round"/>

  <line x1="88" y1="36" x2="80" y2="52" stroke="#1a1008" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="80" y1="52" x2="72" y2="58" stroke="#1a1008" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Right legs -->
  <line x1="68" y1="28" x2="52" y2="12" stroke="#1a1008" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="52" y1="12" x2="44" y2="2"  stroke="#1a1008" stroke-width="1.8" stroke-linecap="round"/>

  <line x1="76" y1="22" x2="60" y2="6"  stroke="#1a1008" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="60" y1="6"  x2="50" y2="0"  stroke="#1a1008" stroke-width="1.8" stroke-linecap="round"/>

  <line x1="88" y1="24" x2="80" y2="8"  stroke="#1a1008" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="80" y1="8"  x2="72" y2="2"  stroke="#1a1008" stroke-width="1.8" stroke-linecap="round"/>
</svg>`;

/* Each ant walks a unique bezier path across the screen */
const ANT_PATHS = [
  /* top area, leftŌåÆright */
  (W,H) => `M -60 ${H*0.12} Q ${W*0.25} ${H*0.04}, ${W*0.5} ${H*0.15} T ${W+60} ${H*0.08}`,
  /* middle, slight wave */
  (W,H) => `M -60 ${H*0.45} Q ${W*0.3} ${H*0.3}, ${W*0.6} ${H*0.5} T ${W+60} ${H*0.4}`,
  /* bottom, rightŌåÆleft (reversed) */
  (W,H) => `M ${W+60} ${H*0.78} Q ${W*0.7} ${H*0.85}, ${W*0.4} ${H*0.72} T -60 ${H*0.8}`,
  /* diagonal crossing */
  (W,H) => `M -60 ${H*0.65} Q ${W*0.4} ${H*0.55}, ${W*0.7} ${H*0.7} T ${W+60} ${H*0.6}`,
  /* extra ant near bottom */
  (W,H) => `M -60 ${H*0.9} Q ${W*0.2} ${H*0.82}, ${W*0.55} ${H*0.92} T ${W+60} ${H*0.87}`,
];

const ANT_DURATIONS = [14, 18, 22, 16, 20]; /* seconds per ant */
const ANT_DELAYS    = [0, 5, 2, 9, 14];     /* start offset seconds */

const antContainer = document.getElementById('ant-container');

/* Leg-wiggle: we animate each ant by walking it along its path manually
   using requestAnimationFrame so we can also oscillate legs vertically */
const antInstances = [];

function createAnt(pathFn, duration, delay) {
  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;';
  wrapper.innerHTML = ANT_SVG_TEMPLATE;
  const svg = wrapper.querySelector('svg');
  antContainer.appendChild(wrapper);

  /* get the 6 "left" and "right" leg lines for wiggling */
  const lines = svg.querySelectorAll('line');
  /* lines 0,2,4 = left legs bottom segment; 1,3,5 = top segment; 6,8,10 right; 7,9,11 right bottom */
  /* We'll just animate all lines with a slight Y wobble keyed to time */

  let startTime = null;
  const totalMs = duration * 1000;
  const delayMs = delay * 1000;

  function getXY(t, pathStr) {
    /* Evaluate cubic bezier from path string at tŌłł[0,1] using a temp SVG */
    const tmp = document.createElementNS('http://www.w3.org/2000/svg','path');
    tmp.setAttribute('d', pathStr);
    const len = tmp.getTotalLength();
    const pt  = tmp.getPointAtLength(len * t);
    /* also get derivative for angle */
    const eps = 0.002;
    const t2  = Math.min(1, t + eps);
    const pt2 = tmp.getPointAtLength(len * t2);
    const angle = Math.atan2(pt2.y - pt.y, pt2.x - pt.x) * 180 / Math.PI;
    return { x: pt.x, y: pt.y, angle };
  }

  function tick(ts) {
    if (!startTime) startTime = ts + delayMs;
    const elapsed = ts - startTime;
    if (elapsed < 0) { requestAnimationFrame(tick); return; }

    const t = (elapsed % totalMs) / totalMs;
    const W = window.innerWidth, H = window.innerHeight;
    const path = pathFn(W, H);
    const { x, y, angle } = getXY(t, path);

    /* Leg wiggle ŌĆö alternate legs up/down at walking frequency */
    const freq = 6; /* leg cycles per second */
    const phase = (elapsed / 1000) * freq * Math.PI * 2;
    const legAmp = 3; /* px wobble amplitude */

    /* left-side legs (lines 0,2,4 = main segment; odd = lower segment) */
    [0,2,4].forEach((i, idx) => {
      const ln = lines[i];
      if (!ln) return;
      const sign = (idx % 2 === 0) ? 1 : -1;
      const w = Math.sin(phase + idx * 1.2) * legAmp * sign;
      const base = parseFloat(ln.getAttribute('y1'));
      ln.setAttribute('y2', (parseFloat(ln.getAttribute('y2')) % 60) + w);
    });

    wrapper.style.transform = `translate(${x}px,${y}px) rotate(${angle}deg) translate(-18px,-9px)`;
    wrapper.style.opacity = '1';
    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
}

function initAnts() {
  ANT_PATHS.forEach((fn, i) => createAnt(fn, ANT_DURATIONS[i], ANT_DELAYS[i]));
}
initAnts();
window.addEventListener('resize', () => {
  /* ants auto-recalculate via W/H inside tick */
});


/* ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ
   FIREWORKS
ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ */
const canvas = document.getElementById('fireworks-canvas');
const ctx    = canvas.getContext('2d');
let fwParticles = [];

function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

class FWParticle {
  constructor(x,y,color) {
    this.x=x; this.y=y; this.color=color;
    this.vx=(Math.random()-0.5)*(Math.random()*14);
    this.vy=(Math.random()-0.5)*(Math.random()*14);
    this.alpha=1; this.friction=0.96; this.gravity=0.15;
  }
  draw() {
    ctx.save(); ctx.globalAlpha=this.alpha; ctx.beginPath();
    ctx.arc(this.x,this.y,2,0,Math.PI*2);
    ctx.fillStyle=this.color; ctx.shadowBlur=10; ctx.shadowColor=this.color;
    ctx.fill(); ctx.restore();
  }
  update() {
    this.vx*=this.friction; this.vy*=this.friction;
    this.vy+=this.gravity; this.x+=this.vx; this.y+=this.vy;
    this.alpha-=0.014;
  }
}

function launchFW(tx,ty) {
  const colors=['#f5c9a8','#c89a5a','#fdf3d4','#d4a060','#a07030','#f5e0a0','#fff8e0'];
  const count = tx!==undefined ? 1 : Math.floor(Math.random()*3)+3;
  for(let i=0;i<count;i++){
    const x = tx||Math.random()*canvas.width;
    const y = ty||Math.random()*(canvas.height*0.7);
    for(let j=0;j<70;j++) fwParticles.push(new FWParticle(x,y,colors[Math.floor(Math.random()*colors.length)]));
  }
}

(function animFW(){
  requestAnimationFrame(animFW);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  fwParticles = fwParticles.filter(p => p.alpha > 0);
  fwParticles.forEach(p=>{ p.update(); p.draw(); });
})();

function makeEyeToggle(btnId,inputId,iconId) {
  let vis=false;

    document.getElementById(inputId).type=vis?'text':'password';
    document.getElementById(iconId).innerHTML=vis?EYE_CLOSED:EYE_OPEN;
  });
}

(function(){
  const sel=document.getElementById('reg-dob');
  const months=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  const yr=new Date().getFullYear();
  for(let y=yr;y>=1930;y--){
    for(let m=0;m<12;m++){
      const o=document.createElement('option');
      o.value=`${y}-${String(m+1).padStart(2,'0')}`;
      o.textContent=`${months[m]} ${y}`;
      sel.appendChild(o);
    }
  }
})();


/* ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ
   CRACK ANIMATION
ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ */
function animateCrack() {
  const path=document.getElementById('crack-path');
  const b1=document.getElementById('crack-branch1');
  const b2=document.getElementById('crack-branch2');
  document.getElementById('crack-overlay').classList.add('visible');
  let st=null;
  function drawMain(ts){
    if(!st)st=ts;
    const p=Math.min((ts-st)/420,1);
    path.style.strokeDashoffset=200*(1-p);
    if(p<1)requestAnimationFrame(drawMain);
    else{
      let s2=null;
      function drawBr(ts2){
        if(!s2)s2=ts2;
        const p2=Math.min((ts2-s2)/200,1);
        b1.style.strokeDashoffset=50*(1-p2);
        b2.style.strokeDashoffset=50*(1-p2);
        if(p2<1)requestAnimationFrame(drawBr);
      }
      requestAnimationFrame(drawBr);
    }
  }
  requestAnimationFrame(drawMain);
}

function spawnCrumbs(cx,cy){
  const colors=['#c89a5a','#a07030','#8ab4d4','#fdf3d4','#d4b07a','#f5c9a8'];
  for(let i=0;i<26;i++){
    const el=document.createElement('div');
    el.className='crumb';
    const size=4+Math.random()*9;
    const angle=(Math.PI*2*i/26)+(Math.random()-0.5)*0.7;
    const dist=70+Math.random()*130;
    el.style.cssText=`width:${size}px;height:${size}px;background:${colors[i%colors.length]};left:${cx-size/2}px;top:${cy-size/2}px;--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;--rot:${(Math.random()-0.5)*720}deg;--dur:${0.5+Math.random()*0.6}s;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1300);
  }
}

let crackBusy=false, registerOpen=false;

document.getElementById('create-btn').addEventListener('click',()=>{
  if(crackBusy)return; crackBusy=true;
  const body=document.getElementById('toaster-body');
  const tL=document.getElementById('toaster-left');
  const tR=document.getElementById('toaster-right');
  const reg=document.getElementById('register-card');

  body.classList.add('shaking');
  setTimeout(()=>body.classList.remove('shaking'),450);
  setTimeout(()=>animateCrack(),200);
  setTimeout(()=>{
    const tw=document.getElementById('toaster-wrap');
    const r=tw.getBoundingClientRect();
    spawnCrumbs(r.left+r.width/2,r.top+r.height/2);
  },580);
  setTimeout(()=>{ tL.classList.add('split'); tR.classList.add('split'); },650);
  setTimeout(()=>{ reg.classList.add('open'); registerOpen=true; crackBusy=false; },900);
});

function closeRegister(){
  if(!registerOpen)return; registerOpen=false;
  const reg=document.getElementById('register-card');
  const tL=document.getElementById('toaster-left');
  const tR=document.getElementById('toaster-right');
  const crackPath=document.getElementById('crack-path');
  const b1=document.getElementById('crack-branch1');
  const b2=document.getElementById('crack-branch2');
  reg.classList.remove('open');
  setTimeout(()=>{ tL.classList.remove('split'); tR.classList.remove('split'); },200);
  setTimeout(()=>{
    crackPath.style.strokeDashoffset=200;
    b1.style.strokeDashoffset=50; b2.style.strokeDashoffset=50;
    document.getElementById('crack-overlay').classList.remove('visible');
  },600);
}
document.getElementById('reg-close').addEventListener('click',closeRegister);

document.getElementById('reg-submit').addEventListener('click',()=>{
  const u=document.getElementById('reg-username').value.trim();
  const e=document.getElementById('reg-email').value.trim();
  const p=document.getElementById('reg-password').value;
  const c=document.getElementById('reg-confirm').value;
  if(!u){alert('Masukkan username!');return;}
  if(!e){alert('Masukkan email!');return;}
  if(p!==c){alert('Password tidak cocok!');return;}
  if(p.length<6){alert('Password minimal 6 karakter!');return;}
  alert(`­¤Äē Akun "${u}" berhasil dibuat!\nSilakan login.`);
  document.getElementById('username').value=u;
  closeRegister();
});

const nominalDisplay = document.getElementById('f-nominal-display');
const nominalHidden  = document.getElementById('f-nominal');

nominalDisplay.addEventListener('input', () => {
  const digits = nominalDisplay.value.replace(/\D/g, '');
  nominalHidden.value = digits;
  // format: 1.500.000
  nominalDisplay.value = digits
    ? Number(digits).toLocaleString('id-ID')
    : '';
});

nominalDisplay.addEventListener('keydown', e => {
  const allowed = ['Backspace','Delete','ArrowLeft','ArrowRight','Tab','Home','End'];
  if (!allowed.includes(e.key) && !/^\d$/.test(e.key)) e.preventDefault();
});

  if (antActive) {
    container.style.display = '';

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw0W-b_DtXHGXtorqfyqwVPZFHWzYqxkl3KKNg8uz06ejjlAxQ-SL6hhBWktradBYd6qA/exec";

function simpanTransaksi() {
  const tanggal    = document.getElementById('f-tanggal').value;
  const jenis      = document.getElementById('f-jenis').value;
  const kategori   = document.getElementById('f-kategori').value;
  const nominal    = nominalHidden.value;          // raw digits
  const keterangan = document.getElementById('f-keterangan').value;
  const statusDiv  = document.getElementById('b-status');
  const btn        = document.getElementById('btn-simpan');

  if(!tanggal||!jenis||!kategori||!nominal){
    statusDiv.textContent='ŌÜĀ’ĖÅ Lengkapi semua field yang wajib diisi.';
    statusDiv.className='b-status error'; statusDiv.style.display='block';
    setTimeout(()=>statusDiv.style.display='none',4000);
    return;
  }

  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span> Menyimpan...';

  const data={tanggal, jenis, kategori, nominal: Number(nominal), keterangan};

  fetch(WEB_APP_URL,{method:'POST',mode:'no-cors',body:JSON.stringify(data)})
  .then(()=>{
    /* ŌöĆŌöĆ SUCCESS: fireworks then logout ŌöĆŌöĆ */
    const r=btn.getBoundingClientRect();
    launchFW(r.left+r.width/2, r.top+r.height/2);
    setTimeout(()=>launchFW(),400);
    setTimeout(()=>launchFW(),800);

    statusDiv.textContent='Ō£© Transaksi berhasil dicatat!';
    statusDiv.className='b-status success'; statusDiv.style.display='block';

    btn.disabled=false;
    btn.innerHTML='<i class="fa-solid fa-paper-plane"></i> Simpan Transaksi';

    /* clear form */
    document.getElementById('f-jenis').value='';
    document.getElementById('f-kategori').value='';
    nominalDisplay.value='';
    nominalHidden.value='';
    document.getElementById('f-keterangan').value='';
    document.getElementById('f-tanggal').valueAsDate=new Date();

    /* logout after delay */
    setTimeout(()=>{ statusDiv.style.display='none'; doLogout(); },3000);
  })
  .catch(err=>{
    /* ŌöĆŌöĆ FAIL: stay on form ŌöĆŌöĆ */
    statusDiv.textContent='ŌØī Gagal menyimpan: '+err.message;
    statusDiv.className='b-status error'; statusDiv.style.display='block';
    btn.disabled=false;
    btn.innerHTML='<i class="fa-solid fa-paper-plane"></i> Simpan Transaksi';
    setTimeout(()=>statusDiv.style.display='none',5000);
  });
}

function doLogout(){
  budgetPage.classList.remove('visible');
  setTimeout(()=>{
    budgetPage.style.display='none';
    cardFlipper.removeAttribute('style');
    cardInner.removeAttribute('style');
    loginScene.removeAttribute('style');
    loginScene.classList.remove('fade-out');
    leverPulled=false;
    leverKnob.classList.remove('pulled');
    heatingBar.classList.remove('active');
    document.getElementById('username').value='';
    document.getElementById('password').value='';
    document.getElementById('eye-icon').innerHTML=EYE_OPEN;
    document.getElementById('password').type='password';
    loginScene.style.display='flex';
  },700);
}
